<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Weekly Monitor — Coming Soon</title>
  <meta name="description" content="Weekly AI tool releases briefing. Updated every Monday." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #0a0a0f; --text: #f0f0f8; --muted: #6b7280; --accent: #a5b4fc; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 30%, rgba(99,102,241,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 70%, rgba(168,85,247,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #f0f0f8, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    p { color: var(--muted); font-size: 1.1rem; max-width: 480px; }
    .updated { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="badge">🤖 AI Weekly Monitor</div>
  <h1>Weekly AI<br />Tools Briefing</h1>
  <p>The first report will appear here after the next Monday scan runs.</p>
  <p class="updated">Updated every Monday · Powered by Gemini + Pollinations.ai</p>
</body>
</html>
